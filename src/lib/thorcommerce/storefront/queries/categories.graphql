query Categories($storeId: ID!, $currency: String!) {
	categories(first: 100) {
		edges {
			node {
				id
				name
				slug
				childrenCount
				products(storeId: $storeId, priceCurrency: $currency) {
					totalCount
				}
			}
		}
	}
}

query CategoryList(
	$slug: String!
	$currency: String!
	$storeId: ID!
	$after: String
	$sortDirection: SortDirection!
	$sortKey: ProductCategorySortKeys!
	$query: String
) {
	category(slug: $slug, storeId: $storeId, priceCurrency: $currency) {
		id
		name
		slug
		ancestors {
			slug
			name
		}
		products(
			first: 15
			after: $after
			sortDirection: $sortDirection
			sortKey: $sortKey
			priceCurrency: $currency
			storeId: $storeId
			query: $query
		) {
			facets {
				...Facet
			}
			edges {
				node {
					id
					...ProductListTile
				}
			}
			totalCount
			pageInfo {
				endCursor
				hasNextPage
			}
		}
	}
}
