query CheckoutCart($id: ID!) {
	cart(id: $id) {
		id
		customerId
		shippingAddress {
			countryCode
		}
		paymentSession {
			id
			__typename
		}
		lineItemsQuantity
		lineItems(first: 100) {
			edges {
				node {
					id
					taxBehavior
					variantName
					variantId
					productName
					quantity
					productSlug
					variant {
						id
						image {
							src
						}
						selectedAttributes {
							value
						}
						availability {
							availableForPurchase
							availableQuantity
							stockPolicy
						}
					}
					unitPrice {
						value {
							...Money
						}
						discountedPrice {
							value {
								...Money
							}
						}
					}
					discountApplications {
						edges {
							node {
								label
								discountedAmount {
									...Money
								}
							}
						}
					}
					total {
						...Money
					}
				}
			}
		}
		discountCodes {
			code
			error
		}
		subtotal {
			...Money
		}
		taxedPrice {
			tax {
				...Money
			}
		}
		total {
			...Money
		}
	}
}

query PaymentGateways($cartId: ID!) {
	paymentGateways(cartId: $cartId) {
		edges {
			node {
				id
				name
				type: __typename
			}
		}
	}
}
