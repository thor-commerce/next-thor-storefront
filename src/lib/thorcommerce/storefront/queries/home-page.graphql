query HomePage($storeId: ID!, $currency: String!) {
	categories(first: 6) {
		edges {
			node {
				id
				name
				slug
				products(storeId: $storeId, priceCurrency: $currency) {
					totalCount
				}
			}
		}
	}
	collections(first: 4) {
		edges {
			node {
				id
				name
				slug
				products(first: 0, storeId: $storeId, priceCurrency: $currency) {
					totalCount
				}
			}
		}
	}
	products(first: 8, sortKey: ID, sortDirection: DESC, storeId: $storeId, priceCurrency: $currency) {
		edges {
			node {
				id
				name
				slug
				heroVariant {
					image {
						src
					}
				}
				priceRange {
					minPrice {
						value {
							centAmount
							currencyCode
							fractionDigits
						}
						discountedPrice {
							value {
								centAmount
								currencyCode
								fractionDigits
							}
						}
					}
				}
			}
		}
	}
}
