query ProductDetail($slug: String!, $currency: String, $store: ID!, $priceChannel: ID) {
	product(slug: $slug, priceCurrency: $currency, storeId: $store, priceChannelId: $priceChannel) {
		id
		name
		description
		#Products can have multiple categories, but for simplicity we will just take the first one and use it for breadcrumbs and SEO.
		categories(first: 1) {
			edges {
				node {
					id
					name
					slug
					ancestors {
						id
						name
						slug
					}
				}
			}
		}
		variants(first: 100) {
			edges {
				node {
					id
					name
					sku
					media(first: 5) {
						edges {
							node {
								id
								src
							}
						}
					}
				}
			}
		}
	}
}
